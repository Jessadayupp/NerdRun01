<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เนิร์ดรัน (Nerd Run) | อุปกรณ์วิ่งคุณภาพสูง</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-primary: #FF7300;
      --color-primary-hover: #E66600;
      --color-secondary: #1B2A47;
      --color-background: #0B0F19;
      --color-surface: #151E32;
      --color-surface-hover: #1E2B45;
      --color-text: #F8FAFC;
      --color-text-muted: #94A3B8;
      
      --font-family: 'Inter', sans-serif;
      --transition-speed: 0.3s;
      --border-radius: 12px;
      --container-width: 1200px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-family);
      background-color: var(--color-background);
      color: var(--color-text);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button {
      font-family: inherit;
      cursor: pointer;
      border: none;
      outline: none;
    }

    .container {
      max-width: var(--container-width);
      margin: 0 auto;
      padding: 0 20px;
    }

    /* Buttons */
    .btn-primary {
      background-color: var(--color-primary);
      color: #fff;
      padding: 12px 28px;
      border-radius: var(--border-radius);
      font-size: 1rem;
      font-weight: 600;
      transition: all var(--transition-speed) ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 15px rgba(255, 115, 0, 0.3);
    }
    .btn-primary:hover {
      background-color: var(--color-primary-hover);
      box-shadow: 0 6px 20px rgba(255, 115, 0, 0.5);
      transform: translateY(-2px);
    }

    .btn-small {
      background-color: var(--color-surface-hover);
      color: var(--color-primary);
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 600;
      transition: all var(--transition-speed) ease;
      border: 1px solid var(--color-primary);
      width: 100%;
      margin-top: auto;
    }
    .btn-small:hover {
      background-color: var(--color-primary);
      color: #fff;
    }

    .btn-large {
      padding: 16px 48px;
      font-size: 1.25rem;
      border-radius: 50px;
      margin-bottom: 40px;
      box-shadow: 0 10px 30px rgba(255, 115, 0, 0.4);
    }
    .btn-large:hover {
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 15px 40px rgba(255, 115, 0, 0.6);
    }

    /* Header */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background-color: rgba(11, 15, 25, 0.85);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }
    .header-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 80px;
    }
    .logo {
      height: 50px;
      object-fit: contain;
    }
    .text-logo {
      font-size: 2rem;
      font-weight: 800;
      color: var(--color-primary);
      letter-spacing: -1px;
      text-transform: uppercase;
      margin: 0;
    }
    .lang-toggle {
      background-color: var(--color-surface);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 6px 14px;
      border-radius: 20px;
      color: var(--color-text-muted);
      font-weight: 500;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all var(--transition-speed) ease;
    }
    .lang-toggle:hover {
      border-color: var(--color-primary);
      background-color: var(--color-surface-hover);
    }
    .lang-toggle .active {
      color: var(--color-primary);
      font-weight: 700;
    }
    .lang-toggle .divider {
      opacity: 0.5;
    }

    /* Hero */
    .hero {
      padding: 80px 0 100px;
      overflow: hidden;
      position: relative;
    }
    .hero-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 40px;
    }
    .hero-text {
      flex: 1;
      max-width: 600px;
      z-index: 2;
    }
    .hero-headline {
      font-size: 3.5rem;
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 20px;
      background: linear-gradient(135deg, #fff 0%, #cbd5e1 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: slideUp 0.8s ease-out;
    }
    .hero-subheadline {
      font-size: 1.2rem;
      color: var(--color-text-muted);
      margin-bottom: 35px;
      animation: slideUp 0.8s ease-out 0.2s backwards;
    }
    .hero-cta {
      animation: slideUp 0.8s ease-out 0.4s backwards;
    }
    .hero-visual {
      flex: 1;
      position: relative;
      height: 500px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
    }
    .hero-backdrop-glow {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(255,115,0,0.15) 0%, rgba(255,115,0,0) 70%);
      border-radius: 50%;
      z-index: -1;
      animation: pulse 4s infinite alternate;
    }
    .image-wrapper {
      position: absolute;
      border-radius: 20px;
      transition: transform 0.5s ease;
    }
    .image-wrapper img {
      max-width: 100%;
      height: auto;
      filter: drop-shadow(0 20px 30px rgba(0,0,0,0.5));
    }
    .t-shirt {
      width: 350px;
      z-index: 2;
      top: 10%;
      left: 10%;
      animation: float 6s ease-in-out infinite;
    }
    .singlet {
      width: 250px;
      z-index: 1;
      bottom: 5%;
      right: 5%;
      animation: float 7s ease-in-out infinite reverse;
    }

    /* Catalog */
    .catalog {
      padding: 80px 0;
      background-color: var(--color-background);
    }
    .section-title {
      text-align: center;
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 50px;
      color: var(--color-text);
    }
    .catalog-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 30px;
    }
    .product-card {
      background-color: var(--color-surface);
      border-radius: var(--border-radius);
      overflow: hidden;
      transition: transform var(--transition-speed) ease, box-shadow var(--transition-speed) ease;
      border: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      flex-direction: column;
    }
    .product-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4), 0 0 15px rgba(255, 115, 0, 0.1);
      border-color: rgba(255, 115, 0, 0.3);
    }
    .product-image-container {
      width: 100%;
      height: 280px;
      background-color: rgba(255, 255, 255, 0.03);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px;
      overflow: hidden;
    }
    .product-image {
      width: 100%;
      height: 100%;
      object-fit: contain;
      transition: transform 0.4s ease;
      filter: drop-shadow(0 10px 15px rgba(0,0,0,0.3));
    }
    .product-card:hover .product-image {
      transform: scale(1.05);
    }
    .product-info {
      padding: 20px;
      display: flex;
      flex-direction: column;
      flex: 1;
    }
    .product-name {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--color-text);
    }
    .product-price {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--color-primary);
      margin-bottom: 20px;
    }

    /* Footer */
    .footer-cta {
      background-color: var(--color-surface);
      padding: 80px 0;
      text-align: center;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
    }
    .footer-container {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .footer-title {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 40px;
      color: var(--color-text);
    }
    .social-links {
      display: flex;
      gap: 20px;
    }
    .social-icon {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background-color: var(--color-background);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-text-muted);
      transition: all var(--transition-speed) ease;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .social-icon:hover {
      background-color: var(--color-primary);
      color: #fff;
      border-color: var(--color-primary);
      transform: translateY(-3px);
    }

    /* Animations */
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-20px); }
      100% { transform: translateY(0px); }
    }
    @keyframes pulse {
      from { transform: translate(-50%, -50%) scale(0.8); opacity: 0.5; }
      to { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
    }

    /* Responsive */
    @media (max-width: 992px) {
      .hero-container {
        flex-direction: column;
        text-align: center;
      }
      .hero-headline { font-size: 2.5rem; }
      .hero-text { margin-bottom: 40px; }
      .hero-visual { width: 100%; height: 400px; }
      .t-shirt { width: 280px; left: 50%; transform: translateX(-60%); }
      .singlet { width: 200px; right: 50%; transform: translateX(80%); }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="container header-content">
      <div class="logo-container">
        <div class="text-logo" data-th="เนิร์ดรัน" data-en="NERDRUN">เนิร์ดรัน</div>
      </div>
      <div class="nav-actions">
        <button class="lang-toggle" onclick="toggleLanguage()" aria-label="Toggle Language">
          <span id="lang-th" class="active">TH</span>
          <span class="divider">/</span>
          <span id="lang-en">EN</span>
        </button>
      </div>
    </div>
  </header>

  <!-- Hero Section -->
  <section class="hero">
    <div class="container hero-container">
      <div class="hero-text">
        <h1 class="hero-headline" data-th="พร้อมลุยทุกเส้นทางไปกับ เนิร์ดรัน" data-en="Ready for Every Path with Nerd Run">
          พร้อมลุยทุกเส้นทางไปกับ เนิร์ดรัน
        </h1>
        <p class="hero-subheadline" data-th="อุปกรณ์วิ่งคุณภาพสูง ดีไซน์เรียบง่าย ตอบโจทย์ทุกการเคลื่อนไหว" data-en="High-quality running gear, minimal design, perfect for every movement.">
          อุปกรณ์วิ่งคุณภาพสูง ดีไซน์เรียบง่าย ตอบโจทย์ทุกการเคลื่อนไหว
        </p>
        <button class="btn-primary hero-cta" onclick="scrollToCatalog()" data-th="เลือกดูสินค้า" data-en="Shop Now">
          เลือกดูสินค้า
        </button>
      </div>
      <div class="hero-visual">
        <div class="image-wrapper t-shirt">
          <img src="./Source/T-Shirt.png" alt="Nerd Run T-Shirt" />
        </div>
        <div class="image-wrapper singlet">
          <img src="./Source/Sing-let.png" alt="Nerd Run Singlet" />
        </div>
        <div class="hero-backdrop-glow"></div>
      </div>
    </div>
  </section>

  <!-- Product Catalog -->
  <section id="catalog" class="catalog">
    <div class="container">
      <h2 class="section-title" data-th="สินค้าของเรา" data-en="Our Products">สินค้าของเรา</h2>
      <div class="catalog-grid" id="product-grid">
        <!-- Products injected via JS -->
      </div>
    </div>
  </section>

  <!-- Footer CTA -->
  <footer class="footer-cta">
    <div class="container footer-container">
      <h2 class="footer-title" data-th="พร้อมที่จะยกระดับการวิ่งของคุณหรือยัง?" data-en="Ready to Elevate Your Run?">
        พร้อมที่จะยกระดับการวิ่งของคุณหรือยัง?
      </h2>
      <button class="btn-primary btn-large" data-th="สั่งซื้อสินค้า" data-en="Order Now">
        สั่งซื้อสินค้า
      </button>
      <div class="social-links">
        <a href="#" class="social-icon" aria-label="Facebook">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M9 8h-3v4h3v12h5v-12h3.642l.358-4h-4v-1.667c0-.955.192-1.333 1.115-1.333h2.885v-5h-3.808c-3.596 0-5.192 1.583-5.192 4.615v3.385z"/></svg>
        </a>
        <a href="#" class="social-icon" aria-label="LINE">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M24 10.304c0-5.369-5.383-9.738-12-9.738-6.616 0-12 4.369-12 9.738 0 4.814 3.53 8.892 8.415 9.605.518.113.88.243.834.793-.016.182-.122.75-.145.89-.044.271-.2.969.837.531 1.037-.437 5.58-3.284 8.04-5.94 1.95-2.096 3.019-4.256 3.019-5.879zM10.875 13.047h-1.603v-4.664h1.603v4.664zm3.931 0h-1.55v-4.664h1.55v4.664zm3.502 0h-2.585v-1.583h1.034v-1.498h-1.034v-1.583h2.585v4.664zm-10.428-4.664v3.167h-1.603v-3.167h1.603zm-1.603-1.002h1.603v.854h-1.603v-.854z"/></svg>
        </a>
      </div>
    </div>
  </footer>

  <script>
    const products = [
      {
        id: 1,
        image: './Source/T-Shirt.png',
        nameTH: 'เสื้อวิ่ง Nerd Run T-Shirt',
        nameEN: 'Nerd Run T-Shirt',
        price: '590 ฿'
      },
      {
        id: 2,
        image: './Source/Sing-let.png',
        nameTH: 'เสื้อกล้ามวิ่ง Nerd Run Singlet',
        nameEN: 'Nerd Run Singlet',
        price: '490 ฿'
      },
      {
        id: 3,
        image: './Source/sock.png',
        nameTH: 'ถุงเท้าวิ่ง Nerd Run Socks',
        nameEN: 'Nerd Run Socks',
        price: '190 ฿'
      }
    ];

    let currentLang = 'TH';

    function renderProducts() {
      const grid = document.getElementById('product-grid');
      grid.innerHTML = '';
      products.forEach(p => {
        const name = currentLang === 'TH' ? p.nameTH : p.nameEN;
        const btnText = currentLang === 'TH' ? 'หยิบใส่ตะกร้า' : 'Add to Cart';
        
        const html = `
          <div class="product-card">
            <div class="product-image-container">
              <img src="${p.image}" alt="${name}" class="product-image" />
            </div>
            <div class="product-info">
              <h3 class="product-name">${name}</h3>
              <p class="product-price">${p.price}</p>
              <button class="btn-small w-full">${btnText}</button>
            </div>
          </div>
        `;
        grid.innerHTML += html;
      });
    }

    function toggleLanguage() {
      currentLang = currentLang === 'TH' ? 'EN' : 'TH';
      
      // Update toggle UI
      document.getElementById('lang-th').className = currentLang === 'TH' ? 'active' : '';
      document.getElementById('lang-en').className = currentLang === 'EN' ? 'active' : '';

      // Update document title
      document.title = currentLang === 'TH' ? 'เนิร์ดรัน (Nerd Run) | อุปกรณ์วิ่งคุณภาพสูง' : 'Nerd Run | Premium Running Gear';

      // Update static text elements
      document.querySelectorAll('[data-th][data-en]').forEach(el => {
        el.innerText = currentLang === 'TH' ? el.getAttribute('data-th') : el.getAttribute('data-en');
      });

      // Re-render products
      renderProducts();
    }

    function scrollToCatalog() {
      document.getElementById('catalog').scrollIntoView({ behavior: 'smooth' });
    }

    // Initial render
    renderProducts();
  </script>
</body>
</html>
